<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Madam Ji ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;

background:linear-gradient(135deg,#ffd6ec,#ffe8f4,#fff0f8);

overflow:hidden;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.container{

width:92%;

max-width:420px;

background:white;

border-radius:30px;

padding:30px;

text-align:center;

box-shadow:0 10px 30px rgba(255,105,180,.25);

position:relative;

z-index:10;

}

h1{

font-family:'Pacifico',cursive;

font-size:38px;

color:#ff4f9a;

margin-bottom:15px;

}

h2{

font-size:24px;

color:#ff69b4;

margin-bottom:15px;

}

p{

color:#555;

line-height:1.8;

font-size:17px;

margin-bottom:20px;

}

button{

padding:14px 28px;

border:none;

background:#ff69b4;

color:white;

font-size:18px;

border-radius:30px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#ff2d8b;

transform:scale(1.05);

}

#message{

margin-top:20px;

font-size:20px;

color:#ff1493;

font-weight:bold;

display:none;

animation:fade 1s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.heart{

position:absolute;

font-size:20px;

animation:float 7s linear infinite;

opacity:.7;

}

@keyframes float{

0%{

transform:translateY(100vh);

opacity:0;

}

100%{

transform:translateY(-100px);

opacity:1;

}

}

canvas{

position:fixed;

top:0;

left:0;

pointer-events:none;

}

.cake{

font-size:70px;

margin-bottom:10px;

}

</style>

</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">

<div class="cake">🎂</div>

<h1>Happy Birthday</h1>

<h2>Madam Ji 💖</h2>

<p>

Today is all about smiles, happiness and beautiful memories.

May your life always stay as cute, sweet and magical as you are.

✨ Happy Birthday Princess! ✨

</p>

<button onclick="celebrate()">

Click Here 🎁

</button>

<div id="message">

🎉 Wishing You Endless Happiness 💕

May all your dreams come true!

🌸💖🎂✨

</div>

</div>

<script>

// Floating Hearts

for(let i=0;i<35;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=4+Math.random()*5+"s";

heart.style.fontSize=15+Math.random()*20+"px";

document.body.appendChild(heart);

}

// Confetti

const canvas=document.getElementById("confetti");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let pieces=[];

for(let i=0;i<220;i++){

pieces.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*6+4,

d:Math.random()*220,

color:`hsl(${Math.random()*360},100%,70%)`,

tilt:Math.random()*10-10

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{

ctx.beginPath();

ctx.fillStyle=p.color;

ctx.fillRect(p.x,p.y,p.r,p.r);

});

update();

}

function update(){

pieces.forEach(p=>{

p.y+=2;

if(p.y>canvas.height){

p.y=-20;

p.x=Math.random()*canvas.width;

}

});

}

setInterval(draw,20);

function celebrate(){

document.getElementById("message").style.display="block";

}

window.onresize=()=>{

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

};

</script>

</body>
</html>
